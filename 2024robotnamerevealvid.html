<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Video Viewer</title>
  <link rel="stylesheet" href="Montserrat-Regular.ttf">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #7151a1, #0095da);
      transition:0.5s;
    }
    .custom-link-nointeract {
      font-family: 'Montserrat', sans-serif;
      background-color: #7c51a1;
      color: white;
      border: none;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 30px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      transition: all 0.3s;
      position: absolute;
      top: 10px;
      left: 140px;
      animation-name: yes2;
      animation-duration: 1s;
    }
    @keyframes yes2 {
      0% {
        opacity:0;
        transform:translateX(100%);
      }
      100% {
        transform:scale(1);
      }
    }
    .custom-link {
      font-family: 'Montserrat', sans-serif;
      background-color: #0095da;
      color: white;
      border: none;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 30px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      transition: all 0.3s;
      position: absolute;
      top: 10px;
      border: 2px solid;
      left: 10px;
      animation-name: yes;
      animation-duration: 1s;
    }
    @keyframes yes {
      0% {
        transform:translateX(-200%);
      }
      100% {
        transform:scale(1);
      }
    }
    .custom-link:active {
      background-color: #005f8d;
      top: 12px;
      box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      color: white;
      margin-top: 20px;
    }

    video {
      width: 80%;
      /* max-width: 2000px; */
      border: 2px solid #0095da;
      border-radius: 10px;
      box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
      /* position: relative; */
      z-index: 1;
      animation-name: yes5;
      animation-duration: 1s;
    }
    @keyframes yes5 {
      0% {
        transform:translateY(10%);
        opacity:0;
      }
      100% {
        transform:scale(1);
      }
    }
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-start-playback-button {
      display:none;
    }
    video::-webkit-media-controls-mute-button {
      display:none;
    }
    video::-webkit-media-controls-fullscreen-button {
      display:none;
    }
    video::-webkit-media-controls-timeline {
      display:none;
      background-color: rgba(0,0,0,0);
    }

    video::-webkit-media-controls-current-time-display,
    video::-webkit-media-controls-time-remaining-display {
      color: #0095da;
    }
  </style>
  
</head>

<body>
  <script src="script.js"></script>
  <button onclick="transitionToPage('index.html')" class="custom-link">Back</button><a class="custom-link-nointeract">2024 Robot Name Reveal Video</a>
  <video controls muted autoplay="true" loop="false" controlslist="play nodownload nofullscreen noplaybackrate noremoteplayback" disablepictureinpicture>
    <source src="2024robotnamerevealvideo.mp4" type="video/mp4">
      There is either no video or your browser doesn't support the video tag in HTML.
  </video>
</body>

</html>
