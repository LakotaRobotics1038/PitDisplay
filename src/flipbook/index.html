<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Flipbook</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0b0b0b;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar,
    .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.75);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .bottombar {
      border-bottom: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .title {
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      font-size: 0.95rem;
      opacity: 0.9;
      min-width: 120px;
      text-align: right;
    }

    .viewer {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #000;
    }

    .book-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 2px 4px;
    }

    #flipbook {
      position: relative;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
    }

    #flipbook .page {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .tap-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 40;
    }

    .tap-zone.left {
      left: 0;
    }

    .tap-zone.right {
      right: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.95rem;
      min-width: 78px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input[type="range"] {
      flex: 1;
      width: 100%;
      accent-color: #7c51a1;
    }

    .loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.36);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .loader.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="title" id="flipbook-title">Flipbook</div>
    <div id="page-indicator" class="meta">Page 1 / 1</div>
  </div>

  <main class="viewer" id="viewer">
    <div class="book-stage" id="book-stage">
      <div class="tap-zone left" id="tap-prev" aria-hidden="true"></div>
      <div class="tap-zone right" id="tap-next" aria-hidden="true"></div>
      <div id="flipbook" aria-label="Flipbook pages"></div>
    </div>
    <div id="loader" class="loader">Loading page…</div>
  </main>

  <div class="bottombar">
    <div class="controls">
      <button id="prev-btn" type="button">Prev</button>
      <input id="page-slider" type="range" min="1" max="1" step="1" value="1" />
      <button id="next-btn" type="button">Next</button>
    </div>
  </div>

  <script src="./vendor/jquery.min.js"></script>
  <script src="./vendor/scissor.min.js"></script>
  <script src="./vendor/turn.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const FLIPBOOK_TITLE = params.get("title") || "IMPACT Report Flipbook";
    const TOTAL_PAGES = Math.max(1, Number.parseInt(params.get("pages") || "56", 10) || 56);
    const PAGES_DIR = (params.get("dir") || "pages").replace(/^\.?\//, "").replace(/\/+$/, "");
    const SPLIT_LANDSCAPE = params.get("splitLandscape") === "true";
    const LEAF_RATIO_OVERRIDE = Number.parseFloat(params.get("leafRatio") || "");
    const BOOK_WIDTH = 1000;
    let BOOK_HEIGHT = 650;
    let currentPage = 1;
    let renderedPages = [];
    let hasLeadingPaddingPage = false;

    document.title = FLIPBOOK_TITLE;

    const flipbookTitle = document.getElementById("flipbook-title");
    const pageIndicator = document.getElementById("page-indicator");
    const pageSlider = document.getElementById("page-slider");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const tapPrev = document.getElementById("tap-prev");
    const tapNext = document.getElementById("tap-next");
    const loader = document.getElementById("loader");
    const viewer = document.getElementById("viewer");
    const flipbook = document.getElementById("flipbook");
    const $flipbook = window.jQuery("#flipbook");

    flipbookTitle.textContent = FLIPBOOK_TITLE;
    flipbook.setAttribute("aria-label", `${FLIPBOOK_TITLE} pages`);
    pageSlider.max = "1";

    const pagePath = (page) => `./${PAGES_DIR}/page-${String(page - 1).padStart(3, "0")}.jpg`;

    const renderedToDisplayPage = (renderedPage) => Math.max(1, renderedPage - (hasLeadingPaddingPage ? 1 : 0));
    const displayToRenderedPage = (displayPage) => displayPage + (hasLeadingPaddingPage ? 1 : 0);

    const loadImageMeta = (page) => new Promise((resolve, reject) => {
      const image = new Image();
      const imagePath = pagePath(page);

      image.onload = () => {
        resolve({ page, imagePath, width: image.naturalWidth, height: image.naturalHeight });
      };

      image.onerror = () => {
        reject(new Error(`Unable to load ${imagePath}`));
      };

      image.src = imagePath;
    });

    const loadScript = (src, onLoad, onError) => {
      const script = document.createElement("script");
      script.src = src;
      script.onload = onLoad;
      script.onerror = onError;
      document.head.appendChild(script);
    };

    const loadTurnEngine = (onReady) => {
      if (window.jQuery && typeof window.jQuery.fn.turn === "function") {
        onReady();
        return;
      }

      loadScript(
        "./turnjs4/lib/turn.min.js",
        () => {
          if (window.jQuery && typeof window.jQuery.fn.turn === "function") {
            onReady();
            return;
          }

          loadScript(
            "./turnjs4/lib/turn.html4.min.js",
            () => {
              if (window.jQuery && typeof window.jQuery.fn.turn === "function") {
                onReady();
              } else {
                loader.textContent = "Unable to initialize flipbook engine.";
              }
            },
            () => {
              loader.textContent = "Unable to initialize flipbook engine.";
            }
          );
        },
        () => {
          loader.textContent = "Unable to initialize flipbook engine.";
        }
      );
    };

    const buildPages = (images) => {
      const fragment = document.createDocumentFragment();

      renderedPages = [];
      hasLeadingPaddingPage = false;

      if (SPLIT_LANDSCAPE && images.length > 0 && images[0].width > images[0].height) {
        const paddingPage = document.createElement("div");
        paddingPage.className = "page";
        fragment.appendChild(paddingPage);
        renderedPages.push({ imagePath: null, isPadding: true });
        hasLeadingPaddingPage = true;
      }

      images.forEach((page) => {
        const shouldSplit = SPLIT_LANDSCAPE && page.width > page.height;

        if (shouldSplit) {
          const stage = document.createElement("div");
          stage.style.position = "absolute";
          stage.style.left = "-100000px";
          stage.style.top = "0";
          stage.style.visibility = "hidden";
          stage.style.width = `${BOOK_WIDTH}px`;
          stage.style.height = `${BOOK_HEIGHT}px`;

          const spreadImage = document.createElement("img");
          spreadImage.src = page.imagePath;
          spreadImage.alt = "";
          spreadImage.draggable = false;
          spreadImage.style.display = "block";
          spreadImage.style.width = `${BOOK_WIDTH}px`;
          spreadImage.style.height = `${BOOK_HEIGHT}px`;

          stage.appendChild(spreadImage);
          document.body.appendChild(stage);
          window.jQuery(spreadImage).scissor();

          const wrappers = Array.from(stage.children);
          wrappers.forEach((wrapper) => {
            wrapper.style.width = "100%";
            wrapper.style.height = "100%";

            const innerImage = wrapper.querySelector("img");
            if (innerImage) {
              innerImage.classList.add("page-image");
              innerImage.style.width = `${BOOK_WIDTH}px`;
              innerImage.style.height = `${BOOK_HEIGHT}px`;
              innerImage.style.maxWidth = "none";
            }

            const pageNode = document.createElement("div");
            pageNode.className = "page";
            pageNode.appendChild(wrapper);
            fragment.appendChild(pageNode);
            renderedPages.push({ imagePath: page.imagePath });
          });

          document.body.removeChild(stage);
          return;
        }

        const pageNode = document.createElement("div");
        pageNode.className = "page";
        const pageImage = document.createElement("img");
        pageImage.className = "page-image";
        pageImage.src = page.imagePath;
        pageImage.alt = "";
        pageImage.draggable = false;
        pageNode.appendChild(pageImage);
        fragment.appendChild(pageNode);
        renderedPages.push({ imagePath: page.imagePath });
      });

      flipbook.appendChild(fragment);
    };

    const getCurrentView = () => {
      const view = $flipbook.turn("view");
      if (!Array.isArray(view) || view.length < 2) {
        return [currentPage, currentPage];
      }
      return [view[0] || currentPage, view[1] || currentPage];
    };

    const getCurrentDisplayView = () => {
      const [renderedLeft, renderedRight] = getCurrentView();
      return [renderedToDisplayPage(renderedLeft), renderedToDisplayPage(renderedRight)];
    };

    const updateUi = () => {
      const [renderedLeft, renderedRight] = getCurrentView();
      const left = renderedToDisplayPage(renderedLeft);
      const right = renderedToDisplayPage(renderedRight);
      const totalRenderedPages = renderedPages.length;
      const totalDisplayPages = totalRenderedPages - (hasLeadingPaddingPage ? 1 : 0);

      if (left === right || left === 1 || right === totalDisplayPages) {
        const singlePage = left === 1 ? 1 : right === totalDisplayPages ? totalDisplayPages : currentPage;
        pageIndicator.textContent = `Page ${singlePage} / ${totalDisplayPages}`;
      } else {
        pageIndicator.textContent = `Pages ${left}-${right} / ${totalDisplayPages}`;
      }

      currentPage = left;
      pageSlider.value = String(left);
      prevBtn.disabled = left <= 1;
      nextBtn.disabled = right >= totalDisplayPages;
    };

    const goToPage = (page) => {
      const totalDisplayPages = renderedPages.length - (hasLeadingPaddingPage ? 1 : 0);
      const target = Math.max(1, Math.min(totalDisplayPages, page));
      if (target === currentPage) return;
      $flipbook.turn("page", displayToRenderedPage(target));
    };

    const fitFlipbookToViewer = () => {
      if (typeof $flipbook.turn !== "function") return;

      const horizontalPadding = 6;
      const verticalPadding = 10;

      const availableWidth = Math.max(320, viewer.clientWidth - horizontalPadding);
      const availableHeight = Math.max(220, viewer.clientHeight - verticalPadding);

      const scale = Math.min(1, availableWidth / BOOK_WIDTH, availableHeight / BOOK_HEIGHT);
      const fittedWidth = Math.max(320, Math.floor(BOOK_WIDTH * scale));
      const fittedHeight = Math.max(220, Math.floor(BOOK_HEIGHT * scale));

      $flipbook.turn("size", fittedWidth, fittedHeight);
      $flipbook.turn("center");
    };

    const getMedianLeafAspectRatio = (images) => {
      if (Number.isFinite(LEAF_RATIO_OVERRIDE) && LEAF_RATIO_OVERRIDE > 0) {
        return LEAF_RATIO_OVERRIDE;
      }

      const leafRatios = images
        .map(({ width, height }) => {
          if (!width || !height) return null;
          const shouldSplit = SPLIT_LANDSCAPE && width > height;
          const leafWidth = shouldSplit ? width / 2 : width;
          return leafWidth / height;
        })
        .filter((ratio) => Number.isFinite(ratio) && ratio > 0)
        .sort((a, b) => a - b);

      if (leafRatios.length === 0) return 0.77;

      const middle = Math.floor(leafRatios.length / 2);
      const medianRatio = leafRatios.length % 2 === 0
        ? (leafRatios[middle - 1] + leafRatios[middle]) / 2
        : leafRatios[middle];

      if (SPLIT_LANDSCAPE && medianRatio < 0.72) {
        return 0.77;
      }

      return medianRatio;
    };

    const init = async () => {
      loader.classList.add("show");

      try {
        const images = await Promise.all(
          Array.from({ length: TOTAL_PAGES }, (_, index) => loadImageMeta(index + 1))
        );

        const ratio = getMedianLeafAspectRatio(images);
        BOOK_HEIGHT = Math.round(BOOK_WIDTH / (ratio * 2));

        flipbook.style.width = `${BOOK_WIDTH}px`;
        flipbook.style.height = `${BOOK_HEIGHT}px`;

        buildPages(images);
        pageSlider.max = String(renderedPages.length - (hasLeadingPaddingPage ? 1 : 0));

        loadTurnEngine(() => {
          if (typeof $flipbook.turn !== "function") {
            loader.textContent = "Unable to initialize flipbook engine.";
            return;
          }

          $flipbook.turn({
            width: BOOK_WIDTH,
            height: BOOK_HEIGHT,
            display: "double",
            autoCenter: true,
            elevation: 50,
            gradients: true,
            acceleration: true,
            duration: 420,
            page: hasLeadingPaddingPage ? 2 : 1,
            when: {
              turned: (_, page) => {
                currentPage = page;
                updateUi();
              }
            }
          });

          $flipbook.turn("display", "double");
          fitFlipbookToViewer();
          currentPage = 1;
          updateUi();
          loader.classList.remove("show");

          window.addEventListener("resize", fitFlipbookToViewer);
        });
      } catch {
        loader.textContent = "Unable to load flipbook pages.";
      }
    };

    const goPrevious = () => {
      const [left] = getCurrentDisplayView();
      goToPage(left - 1);
    };

    const goNext = () => {
      const [, right] = getCurrentDisplayView();
      goToPage(right + 1);
    };

    prevBtn.addEventListener("click", goPrevious);
    nextBtn.addEventListener("click", goNext);

    pageSlider.addEventListener("input", () => {
      const requestedPage = Number(pageSlider.value);
      goToPage(requestedPage);
    });

    tapPrev.addEventListener("click", goPrevious);
    tapNext.addEventListener("click", goNext);

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        goPrevious();
      }
      if (event.key === "ArrowRight") {
        goNext();
      }
    });

    init();
  </script>
</body>

</html>
